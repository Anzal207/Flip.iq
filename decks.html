<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flip.IQ | My Decks</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/decks.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>

  <body>
    <!-- TOP BAR -->

    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>

      <h1>Flip.IQ</h1>
    </header>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">
      <nav>
        <a href="index.html" class="nav-link"> Home </a>

        <a href="decks.html" class="nav-link active"> My Decks </a>

        <a href="quick-study.html" class="nav-link"> Quick Study </a>

        <a href="analytics.html" class="nav-link"> Analytics </a>

        <a href="achievements.html" class="nav-link"> Achievements </a>

        <a href="settings.html" class="nav-link"> Settings </a>
      </nav>

      <div class="close-menu" id="closeMenu">✕ Close Menu</div>
    </aside>

    <!-- MAIN CONTENT -->

    <main class="main-content">
      <section class="page-header">
        <div>
          <h1>📚 My Decks</h1>

          <p>Manage and organize your study decks.</p>
        </div>

        <button id="createDeckBtn" class="primary-btn">+ New Deck</button>
      </section>

      <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search decks..." />
      </section>

      <section>
        <div id="deckContainer" class="deck-grid">
          <!-- Injected by JS -->
        </div>
      </section>
    </main>

    <!-- CREATE DECK MODAL -->

    <div id="deckModal" class="modal hidden">
      <div class="modal-content">
        <h2>Create New Deck</h2>

        <input type="text" id="deckNameInput" placeholder="Deck Name" />

        <button id="saveDeckBtn" class="primary-btn">Create Deck</button>
      </div>
    </div>

    <script src="js/storage.js"></script>

    <script src="js/decks.js"></script>

    <script src="js/mobile-nav.js"></script>
  </body>
</html>
