<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flip.IQ | Study Deck</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/study.css" />
  </head>

  <body>
    <!-- TOP BAR -->

    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>

      <h1>Flip.IQ</h1>
    </header>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">
      <nav>
        <a href="index.html" class="nav-link"> Home </a>

        <a href="decks.html" class="nav-link active"> My Decks </a>

        <a href="quick-study.html" class="nav-link"> Quick Study </a>

        <a href="analytics.html" class="nav-link"> Analytics </a>

        <a href="achievements.html" class="nav-link"> Achievements </a>

        <a href="settings.html" class="nav-link"> Settings </a>
      </nav>

      <div class="close-menu" id="closeMenu">✕ Close Menu</div>
    </aside>

    <!-- MAIN CONTENT -->

    <main class="main-content">
      <section class="study-header">
        <h1 id="deckName">Deck</h1>

        <p id="cardCounter">Card 1 of 1</p>
      </section>

      <section class="progress-section">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <p id="progressText">0%</p>
      </section>

      <section class="study-card">
        <div id="cardText">No Cards</div>
      </section>

      <p class="study-tip">Click the card or press Flip</p>

      <section class="controls">
        <button id="prevBtn" class="primary-btn">Previous</button>

        <button id="flipBtn" class="primary-btn">Flip</button>

        <button id="nextBtn" class="primary-btn">Next</button>
      </section>
    </main>

    <script src="js/storage.js"></script>

    <script src="js/study.js"></script>

    <script src="js/mobile-nav.js"></script>
  </body>
</html>
