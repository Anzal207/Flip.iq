<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flip.IQ | Flashcards</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/flashcards.css" />
  </head>

  <body>
    <!-- TOP BAR -->

    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>

      <h1>Flip.IQ</h1>
    </header>

    <!-- SIDEBAR -->

    <aside class="sidebar" id="sidebar">
      <nav>
        <a href="index.html" class="nav-link"> Home </a>

        <a href="decks.html" class="nav-link active"> My Decks </a>

        <a href="quick-study.html" class="nav-link"> Quick Study </a>

        <a href="analytics.html" class="nav-link"> Analytics </a>

        <a href="achievements.html" class="nav-link"> Achievements </a>

        <a href="settings.html" class="nav-link"> Settings </a>
      </nav>

      <div class="close-menu" id="closeMenu">✕ Close Menu</div>
    </aside>

    <!-- MAIN CONTENT -->

    <main class="main-content">
      <section class="page-header">
        <div>
          <h1 id="deckTitle">📚 History</h1>

          <p>Manage flashcards in this deck.</p>
        </div>

        <button id="addCardBtn" class="primary-btn">+ Add Flashcard</button>
      </section>

      <section class="top-actions">
        <button id="studyDeckBtn" class="primary-btn">🎯 Study Deck</button>
      </section>

      <section>
        <div id="flashcardContainer" class="flashcard-grid">
          <!-- JS will insert cards here -->
        </div>
      </section>
    </main>

    <!-- ADD CARD MODAL -->

    <div id="cardModal" class="modal hidden">
      <div class="modal-content">
        <h2>Add Flashcard</h2>

        <input type="text" id="questionInput" placeholder="Question" />

        <textarea id="answerInput" placeholder="Answer"></textarea>

        <button id="saveCardBtn" class="primary-btn">Save Flashcard</button>
      </div>
    </div>

    <script src="js/storage.js"></script>

    <script src="js/flashcards.js"></script>

    <script src="js/mobile-nav.js"></script>
  </body>
</html>
